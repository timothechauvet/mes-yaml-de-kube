apiVersion: apps/v1
kind: Deployment
metadata:
  name: jodubranding-nginx
  namespace: jodubranding
  labels:
    app: jodubranding-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jodubranding-nginx
  template:
    metadata:
      labels:
        app: jodubranding-nginx
    spec:
      nodeSelector:
        kubernetes.io/hostname: o1k2
      containers:
      - name: nginx
        image: nginx:alpine
        command:
        - sh
        - -c
        - |
          cat <<'EOF' > /etc/nginx/conf.d/default.conf
          server {
              listen 80;
              server_name jodubranding.com;

              location /api {
                  proxy_pass http://backend-service:80;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location / {
                  proxy_pass http://frontend-service:80;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          EOF
          exec nginx -g "daemon off;"
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
