apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sdjsac-route
  namespace: default
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main-gateway
      namespace: jodubranding
  hostnames:
    - sdjsac.in
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: sdjsac-frontend
          port: 80
